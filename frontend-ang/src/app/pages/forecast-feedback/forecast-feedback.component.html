<div class="space-y-5">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-bold text-gray-900">Forecast Feedback</h1>
    <button (click)="openAdd()" class="flex items-center gap-2 bg-[#00BCD4] text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-[#00ACC1] transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke-width="2"/><line x1="5" y1="12" x2="19" y2="12" stroke-width="2"/></svg>
      Add Feedback
    </button>
  </div>

  <div class="grid grid-cols-3 gap-4">
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 text-center">
      <div class="text-2xl font-bold text-green-600">{{ approved }}</div>
      <div class="text-xs text-gray-500 mt-1">Approved</div>
    </div>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 text-center">
      <div class="text-2xl font-bold text-yellow-600">{{ pending }}</div>
      <div class="text-xs text-gray-500 mt-1">Pending</div>
    </div>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 text-center">
      <div class="text-2xl font-bold text-red-500">{{ rejected }}</div>
      <div class="text-xs text-gray-500 mt-1">Rejected</div>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
    <h3 class="text-sm font-semibold text-gray-700 mb-3">System Forecast vs Management Adjustment</h3>
    <div style="height:200px"><canvas baseChart [data]="lineChart" [type]="'line'" [options]="chartOptions"></canvas></div>
  </div>

  <app-loading-skeleton *ngIf="loading" type="table"></app-loading-skeleton>
  <app-error-card *ngIf="error && !loading" (onRetry)="load()"></app-error-card>
  <app-data-grid *ngIf="!loading && !error" [data]="itemsAsRecords" [columns]="columns" [pageSize]="10" downloadFilename="forecast-feedback.csv"></app-data-grid>

  <!-- Modal -->
  <div *ngIf="showModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-bold text-gray-900">{{ editItem ? 'Edit Feedback' : 'Add Feedback' }}</h2>
        <button (click)="showModal = false" class="text-gray-400 hover:text-gray-600 text-xl">×</button>
      </div>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-medium text-gray-600 block mb-1">Month</label>
            <select [(ngModel)]="formMonth" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-teal-500">
              <option *ngFor="let m of monthLabels">{{ m }}</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-600 block mb-1">Skill Cluster</label>
            <select [(ngModel)]="formCluster" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-teal-500">
              <option *ngFor="let c of clusters">{{ c }}</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-medium text-gray-600 block mb-1">System Forecast</label>
            <input type="number" [(ngModel)]="formSystemForecast" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-teal-500" />
          </div>
          <div>
            <label class="text-xs font-medium text-gray-600 block mb-1">Management Adjustment</label>
            <input type="number" [(ngModel)]="formMgmtAdjustment" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-teal-500" />
          </div>
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 block mb-1">Reason for Adjustment</label>
          <textarea [(ngModel)]="formReason" rows="3" placeholder="Explain the reason..." class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-teal-500 resize-none"></textarea>
        </div>
        <div *ngIf="formMgmtAdjustment !== formSystemForecast" class="bg-yellow-50 border border-yellow-200 rounded-lg px-3 py-2 text-xs text-yellow-700">
          Adjustment: {{ deviation }}% deviation from system forecast
        </div>
      </div>
      <div class="flex gap-3 mt-5">
        <button (click)="showModal = false" class="flex-1 border border-gray-200 text-gray-600 text-sm py-2 rounded-lg hover:bg-gray-50">Cancel</button>
        <button (click)="save()" [disabled]="!formReason" class="flex-1 bg-[#00BCD4] text-white text-sm font-medium py-2 rounded-lg hover:bg-[#00ACC1] disabled:opacity-50">Save</button>
      </div>
    </div>
  </div>
</div>
