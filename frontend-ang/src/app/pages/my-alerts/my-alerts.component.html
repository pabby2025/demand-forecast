<div class="space-y-4">
  <div class="flex items-center gap-3">
    <h1 class="text-xl font-bold text-gray-900">My Alerts</h1>
    <span *ngIf="unread > 0" class="bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">{{ unread }} new</span>
  </div>

  <div class="flex gap-1 bg-white rounded-xl border border-gray-100 shadow-sm p-1 w-fit">
    <button *ngFor="let tab of filterTabs" (click)="activeTab = tab"
            [class]="'px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ' + (activeTab === tab ? 'bg-[#1B2559] text-white' : 'text-gray-500 hover:text-gray-700')">
      {{ tab }}
      <span [class]="'ml-1.5 text-xs px-1 rounded-full ' + (activeTab === tab ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-500')">
        {{ countFor(tab) }}
      </span>
    </button>
  </div>

  <!-- New alert cards -->
  <div *ngIf="activeTab === 'All' && newAlerts.length > 0" class="grid grid-cols-1 lg:grid-cols-2 gap-3">
    <div *ngFor="let alert of newAlerts" class="bg-red-50 border border-red-200 rounded-xl p-4">
      <div class="flex items-start justify-between gap-3">
        <div class="flex items-start gap-3">
          <svg class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke-width="2"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke-width="2"/></svg>
          <div>
            <p class="text-sm font-semibold text-red-800">{{ alert.alert_type }}</p>
            <p class="text-xs text-red-600 mt-0.5">{{ alert.description }}</p>
            <div class="flex items-center gap-2 mt-2">
              <app-status-badge [status]="alert.severity ?? 'Medium'"></app-status-badge>
              <span class="text-xs text-gray-500">{{ alert.category }}</span>
            </div>
          </div>
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <button (click)="acknowledge(alert)" class="text-xs bg-white border border-red-200 text-red-600 px-2 py-1 rounded hover:bg-red-50 transition-colors">Acknowledge</button>
          <button (click)="dismiss(alert)" class="p-1 text-gray-400 hover:text-gray-600">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke-width="2"/><line x1="6" y1="6" x2="18" y2="18" stroke-width="2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <app-loading-skeleton *ngIf="loading" type="table" [rows]="8"></app-loading-skeleton>
  <app-error-card *ngIf="error && !loading" (onRetry)="load()"></app-error-card>
  <app-data-grid *ngIf="!loading && !error" [data]="filteredAsRecords" [columns]="columns" [pageSize]="10" downloadFilename="alerts.csv"></app-data-grid>
</div>
