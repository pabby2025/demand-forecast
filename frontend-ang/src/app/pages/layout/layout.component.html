<div class="flex h-screen bg-gray-50">
  <!-- Sidebar -->
  <aside class="w-64 bg-[#1B2559] flex flex-col flex-shrink-0">
    <div class="p-6 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-[#00BCD4] rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" stroke-width="2"/><polyline points="17 6 23 6 23 12" stroke-width="2"/>
          </svg>
        </div>
        <div>
          <div class="text-white font-bold text-sm">Demand Planner</div>
          <div class="text-white/50 text-xs">TMP Platform</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <!-- Executive Summary -->
      <a routerLink="/" routerLinkActive="bg-white/15 text-white font-medium" [routerLinkActiveOptions]="{exact:true}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-white/70 hover:bg-white/10 hover:text-white">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" stroke-width="2"/><rect x="14" y="3" width="7" height="7" stroke-width="2"/><rect x="14" y="14" width="7" height="7" stroke-width="2"/><rect x="3" y="14" width="7" height="7" stroke-width="2"/></svg>
        Executive Summary
      </a>
      <!-- Forecast Dashboard -->
      <a routerLink="/forecast" routerLinkActive="bg-white/15 text-white font-medium"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-white/70 hover:bg-white/10 hover:text-white">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" stroke-width="2"/><polyline points="17 6 23 6 23 12" stroke-width="2"/></svg>
        Forecast Dashboard
      </a>
      <!-- Forecast Feedback -->
      <a routerLink="/feedback" routerLinkActive="bg-white/15 text-white font-medium"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-white/70 hover:bg-white/10 hover:text-white">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-width="2"/></svg>
        Forecast Feedback
      </a>
      <!-- Skill Taxonomy -->
      <a routerLink="/taxonomy" routerLinkActive="bg-white/15 text-white font-medium"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-white/70 hover:bg-white/10 hover:text-white">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="5" r="3" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="12" stroke-width="2"/><circle cx="6" cy="17" r="3" stroke-width="2"/><circle cx="18" cy="17" r="3" stroke-width="2"/><line x1="12" y1="12" x2="6" y2="14" stroke-width="2"/><line x1="12" y1="12" x2="18" y2="14" stroke-width="2"/></svg>
        Skill Taxonomy
      </a>
      <!-- My Tasks -->
      <a routerLink="/tasks" routerLinkActive="bg-white/15 text-white font-medium"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-white/70 hover:bg-white/10 hover:text-white">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4" stroke-width="2"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-width="2"/></svg>
        My Tasks
      </a>
      <!-- My Alerts -->
      <a routerLink="/alerts" routerLinkActive="bg-white/15 text-white font-medium"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-white/70 hover:bg-white/10 hover:text-white">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke-width="2"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke-width="2"/></svg>
        My Alerts
      </a>
    </nav>

    <div class="p-4 border-t border-white/10">
      <!-- User info -->
      <div class="flex items-center gap-3 mb-3">
        <div class="w-8 h-8 bg-[#00BCD4] rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
          {{ userInitial }}
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-white text-xs font-medium truncate">{{ userName }}</div>
          <div class="text-white/40 text-xs truncate">{{ userEmail }}</div>
        </div>
      </div>
      <!-- Change Password -->
      <a routerLink="/change-password"
         class="w-full flex items-center gap-2 px-3 py-2 text-white/60 hover:text-white hover:bg-white/10 rounded-lg text-xs transition-colors mb-0.5">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-width="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-width="2"/>
        </svg>
        Change Password
      </a>
      <!-- Logout -->
      <button (click)="handleLogout()"
              class="w-full flex items-center gap-2 px-3 py-2 text-white/60 hover:text-white hover:bg-white/10 rounded-lg text-xs transition-colors">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke-width="2"/>
          <polyline points="16 17 21 12 16 7" stroke-width="2"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke-width="2"/>
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <main class="flex-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
