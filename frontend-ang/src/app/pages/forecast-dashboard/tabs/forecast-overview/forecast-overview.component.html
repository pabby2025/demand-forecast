<app-loading-skeleton *ngIf="loading" type="page"></app-loading-skeleton>
<app-error-card *ngIf="error && !loading" (onRetry)="load()"></app-error-card>

<div *ngIf="!loading && !error && data" class="space-y-5">
  <!-- KPIs -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
    <app-kpi-card title="Total Forecast FTE" [value]="kpis['total_forecast_fte']" subtitle="M0–M5" [trend]="kpis['yoy_growth']" color="teal">
      <svg slot="icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" stroke-width="2"/></svg>
    </app-kpi-card>
    <app-kpi-card title="MoM Change" [value]="'+' + kpis['mom_change'] + '%'" subtitle="Month-over-Month" [trend]="kpis['mom_change']" color="navy"></app-kpi-card>
    <app-kpi-card title="QoQ Growth" [value]="'+' + kpis['yoy_growth'] + '%'" subtitle="Quarter-over-Quarter" [trend]="kpis['yoy_growth']" color="purple"></app-kpi-card>
    <app-kpi-card title="Avg Cancellation" [value]="kpis['avg_cancellation_pct'] + '%'" subtitle="SOs with Cancellation Reason" [trend]="0" color="orange"></app-kpi-card>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <h3 class="text-sm font-semibold text-gray-700 mb-3">Monthly Trend</h3>
      <div style="height:160px"><canvas baseChart [data]="monthlyChart" [type]="'line'" [options]="commonOptions"></canvas></div>
    </div>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <h3 class="text-sm font-semibold text-gray-700 mb-3">Weekly Trend</h3>
      <div style="height:160px"><canvas baseChart [data]="weeklyChart" [type]="'line'" [options]="commonOptions"></canvas></div>
    </div>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <h3 class="text-sm font-semibold text-gray-700 mb-3">Quarterly Trend</h3>
      <div style="height:160px"><canvas baseChart [data]="quarterlyChart" [type]="'bar'" [options]="commonOptions"></canvas></div>
    </div>
  </div>

  <!-- Grid -->
  <app-data-grid [data]="grid" [columns]="columns" [pageSize]="9" downloadFilename="forecast-overview.csv"></app-data-grid>
</div>
