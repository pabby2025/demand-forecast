<div class="min-h-screen bg-[#1B2559] flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-[#00BCD4] rounded-2xl flex items-center justify-center mb-4 shadow-lg">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" stroke-width="2"/><polyline points="17 6 23 6 23 12" stroke-width="2"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Demand Planning Platform</h1>
      <p class="text-white/60 text-sm mt-1">TMP Reimagination Initiative</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-lg font-semibold text-gray-800 mb-6">Sign in to your account</h2>

      <form (ngSubmit)="handleLogin()" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Email address</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="you@company.com"
                 class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-[#00BCD4] focus:ring-1 focus:ring-[#00BCD4]" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••"
                 class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-[#00BCD4] focus:ring-1 focus:ring-[#00BCD4]" />
        </div>

        <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-600 text-xs px-3 py-2 rounded-lg">
          {{ error }}
        </div>

        <button type="submit" [disabled]="loading"
                class="w-full bg-[#00BCD4] hover:bg-[#00ACC1] text-white font-semibold py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2 disabled:opacity-60">
          <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-xs text-gray-400">
          <span class="bg-white px-3">or sign in as demo user</span>
        </div>
      </div>

      <!-- Presets -->
      <div class="space-y-2">
        <button *ngFor="let preset of presets" (click)="handleLogin(preset)" [disabled]="loading"
                class="w-full text-left px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50 hover:border-[#00BCD4] transition-colors disabled:opacity-60">
          <span class="font-medium">{{ preset.label }}</span>
          <span class="text-gray-400 text-xs ml-2">— {{ preset.email }}</span>
        </button>
      </div>
    </div>
  </div>
</div>
