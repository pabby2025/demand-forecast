<div class="min-h-screen bg-[#1B2559] flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Logo mark -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-[#00BCD4] rounded-2xl flex items-center justify-center mb-4 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" stroke-width="2"/>
          <polyline points="17 6 23 6 23 12" stroke-width="2"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-white tracking-tight">Demand Planning Platform</h1>
      <p class="text-white/50 text-xs mt-1">TMP Reimagination · Cognizant</p>
    </div>

    <!-- Login card -->
    <div class="bg-white rounded-2xl shadow-2xl p-7">
      <h2 class="text-base font-semibold text-gray-800 mb-1">Sign in</h2>
      <p class="text-xs text-gray-400 mb-5">Use the access code shared by your administrator, or your password if you've already set one.</p>

      <form (ngSubmit)="handleLogin()" class="space-y-4" autocomplete="off">

        <!-- Email -->
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Work Email</label>
          <input type="email" [(ngModel)]="email" name="email" autocomplete="email"
                 placeholder="you@company.com" required
                 class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg
                        focus:outline-none focus:border-[#00BCD4] focus:ring-1 focus:ring-[#00BCD4]
                        placeholder:text-gray-300" />
        </div>

        <!-- Credential (access code or password) -->
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Access Code or Password</label>
          <div class="relative">
            <input [type]="showCredential ? 'text' : 'password'"
                   [(ngModel)]="credential" name="credential" autocomplete="current-password"
                   placeholder="••••••••" required
                   class="w-full px-3 py-2.5 pr-10 text-sm border border-gray-200 rounded-lg
                          focus:outline-none focus:border-[#00BCD4] focus:ring-1 focus:ring-[#00BCD4]
                          placeholder:text-gray-300" />
            <button type="button" (click)="toggleShowCredential()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <!-- Eye icon -->
              <svg *ngIf="!showCredential" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke-width="2"/>
              </svg>
              <!-- Eye-off icon -->
              <svg *ngIf="showCredential" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" stroke-width="2" stroke-linecap="round"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" stroke-width="2" stroke-linecap="round"/>
                <line x1="1" y1="1" x2="23" y2="23" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div *ngIf="error" class="flex items-start gap-2 bg-red-50 border border-red-100 text-red-600 text-xs px-3 py-2.5 rounded-lg">
          <svg class="w-3.5 h-3.5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="12" stroke-width="2"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="2"/>
          </svg>
          {{ error }}
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="loading"
                class="w-full bg-[#00BCD4] hover:bg-[#00ACC1] disabled:bg-[#00BCD4]/60
                       text-white font-semibold py-2.5 rounded-lg text-sm transition-colors
                       flex items-center justify-center gap-2 mt-1">
          <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          {{ loading ? 'Signing in…' : 'Sign in' }}
        </button>
      </form>
    </div>

    <!-- Footer note -->
    <p class="text-center text-white/40 text-xs mt-6">
      Don't have access? Contact your administrator to request an access code.
    </p>
  </div>
</div>
