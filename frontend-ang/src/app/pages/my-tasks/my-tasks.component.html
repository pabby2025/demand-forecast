<div class="space-y-4">
  <!-- Header -->
  <div class="flex items-center gap-3">
    <h1 class="text-xl font-bold text-gray-900">My Tasks</h1>
    <span class="bg-[#1B2559] text-white text-xs font-bold px-2 py-0.5 rounded-full">{{ tasks.length }}</span>
  </div>

  <!-- Filter Tabs -->
  <div class="flex gap-1 bg-white rounded-xl border border-gray-100 shadow-sm p-1 w-fit">
    <button *ngFor="let tab of filterTabs" (click)="activeTab = tab"
            [class]="'px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ' + (activeTab === tab ? 'bg-[#1B2559] text-white' : 'text-gray-500 hover:text-gray-700')">
      {{ tab }}
      <span [class]="'ml-1.5 text-xs px-1 rounded-full ' + (activeTab === tab ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-500')">
        {{ countFor(tab) }}
      </span>
    </button>
  </div>

  <app-loading-skeleton *ngIf="loading" type="table" [rows]="8"></app-loading-skeleton>
  <app-error-card *ngIf="error && !loading" (onRetry)="load()"></app-error-card>

  <div *ngIf="!loading && !error">
    <app-data-grid [data]="filteredAsRecords" [columns]="columns" [pageSize]="10" downloadFilename="tasks.csv"></app-data-grid>
  </div>

  <!-- Detail Modal -->
  <div *ngIf="selected" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-gray-900">{{ selected.task_id }}</h2>
        <button (click)="selected = null" class="text-gray-400 hover:text-gray-600 text-xl">×</button>
      </div>
      <h3 class="font-semibold text-gray-800 mb-3">{{ selected.task_type }}</h3>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-gray-500">Type</span><span>{{ selected.task_type }}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Priority</span><app-status-badge [status]="selected.priority ?? 'Medium'"></app-status-badge></div>
        <div class="flex justify-between"><span class="text-gray-500">Status</span><app-status-badge [status]="selected.status"></app-status-badge></div>
        <div class="flex justify-between"><span class="text-gray-500">Due Date</span><span>{{ selected.due_date }}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Assigned By</span><span>{{ selected.assigned_by }}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Cluster</span><span class="text-right text-xs max-w-[200px]">{{ selected.cluster }}</span></div>
      </div>
      <p class="text-sm text-gray-600 mt-4 bg-gray-50 p-3 rounded-lg">{{ selected.description }}</p>
      <div class="flex gap-2 mt-5">
        <button *ngIf="selected.status !== 'Completed'" (click)="markComplete(selected); selected = null"
                class="flex-1 bg-green-600 text-white text-sm py-2 rounded-lg hover:bg-green-700 transition-colors">
          Mark Complete
        </button>
        <button (click)="selected = null" class="flex-1 border border-gray-200 text-gray-600 text-sm py-2 rounded-lg hover:bg-gray-50 transition-colors">
          Close
        </button>
      </div>
    </div>
  </div>
</div>
