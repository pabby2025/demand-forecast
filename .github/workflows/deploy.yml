# NOTE: This GitHub Actions workflow is for reference/personal-repo use only.
# Cognizant GHES deployments are handled via ADT pipelines in YAML/
# See YAML/4898-WA-DemandForecast.yaml and YAML/4898-WS-DemandForecastAPI.yaml

name: Deploy OneC-4898 DemandForecast to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # CONFIRM with DevOps POC — replace with actual Azure App Service names
  FRONTEND_APP: occ-4898-demandforecast-wa
  BACKEND_APP: occ-4898-demandforecast-ws

jobs:
  deploy-frontend:
    name: Build & Deploy Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-ang/package-lock.json

      - name: Install & Build Angular
        run: |
          cd frontend-ang
          npm install --legacy-peer-deps
          npm run build:prod

      - name: Inject API URL into index.html
        run: |
          # CONFIRM: replace with actual backend App Service URL
          sed -i 's|</head>|<script>window.env={API_URL:"https://occ-4898-demandforecast-ws.azurewebsites.net"};</script></head>|' \
            frontend-ang/dist/demand-planning-frontend-ang/browser/index.html

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend-ang/dist/demand-planning-frontend-ang/browser

  deploy-backend:
    name: Deploy FastAPI Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./backend
