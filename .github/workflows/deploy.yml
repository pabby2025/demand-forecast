name: Deploy DFC Full Stack to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: demand-forecast
  LOCATION: eastus
  POSTGRES_SERVER: dfc-postgres
  POSTGRES_DB: demand_forecast_db
  POSTGRES_USER: dfcadmin
  APP_PLAN: dfc-plan
  BACKEND_APP: dfc-backend
  ML_APP: dfc-ml
  FRONTEND_APP: dfc-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Deploy PostgreSQL + Run SQL Schema
  # ─────────────────────────────────────────
  deploy-database:
    name: Deploy PostgreSQL Database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create PostgreSQL Flexible Server
        run: |
          EXISTS=$(az postgres flexible-server show --name $POSTGRES_SERVER --resource-group $RESOURCE_GROUP --query name -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            az postgres flexible-server create \
              --name $POSTGRES_SERVER \
              --resource-group $RESOURCE_GROUP \
              --location $LOCATION \
              --admin-user $POSTGRES_USER \
              --admin-password "${{ secrets.POSTGRES_PASSWORD }}" \
              --sku-name Standard_B1ms \
              --tier Burstable \
              --storage-size 32 \
              --version 15 \
              --public-access 0.0.0.0
          else
            echo "PostgreSQL server already exists, skipping creation."
          fi

      - name: Create Database
        run: |
          az postgres flexible-server db create \
            --server-name $POSTGRES_SERVER \
            --resource-group $RESOURCE_GROUP \
            --database-name $POSTGRES_DB 2>/dev/null || echo "Database already exists."

      - name: Allow GitHub Actions IP
        run: |
          MY_IP=$(curl -s https://api.ipify.org)
          az postgres flexible-server firewall-rule create \
            --name allow-github-actions \
            --resource-group $RESOURCE_GROUP \
            --server-name $POSTGRES_SERVER \
            --start-ip-address $MY_IP \
            --end-ip-address $MY_IP 2>/dev/null || echo "Firewall rule already exists."

      - name: Run SQL Schema Files
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          sudo apt-get install -y postgresql-client
          HOST="${POSTGRES_SERVER}.postgres.database.azure.com"
          for f in database/01_ddl_schema.sql database/02_dml_seed_data.sql database/03_source_target_mapping.sql database/04_stored_procedures.sql database/05_eds_ingestion_guide.sql; do
            echo "Running $f..."
            psql -h $HOST -U $POSTGRES_USER -d $POSTGRES_DB -f $f
          done

  # ─────────────────────────────────────────
  # JOB 2: Deploy FastAPI Backend
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy FastAPI Backend
    runs-on: ubuntu-latest
    needs: deploy-database
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create App Service Plan
        run: |
          EXISTS=$(az appservice plan show --name $APP_PLAN --resource-group $RESOURCE_GROUP --query name -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            az appservice plan create --name $APP_PLAN --resource-group $RESOURCE_GROUP --sku B2 --is-linux
          else
            echo "App Service Plan already exists."
          fi

      - name: Create Backend Web App
        run: |
          EXISTS=$(az webapp show --name $BACKEND_APP --resource-group $RESOURCE_GROUP --query name -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            az webapp create --name $BACKEND_APP --resource-group $RESOURCE_GROUP --plan $APP_PLAN --runtime "PYTHON:3.11"
          else
            echo "Backend app already exists."
          fi

      - name: Configure Backend Settings
        run: |
          az webapp config appsettings set --name $BACKEND_APP --resource-group $RESOURCE_GROUP --settings \
            DATABASE_URL="postgresql://$POSTGRES_USER:${{ secrets.POSTGRES_PASSWORD }}@$POSTGRES_SERVER.postgres.database.azure.com/$POSTGRES_DB" \
            ENVIRONMENT="production"
          az webapp config set --name $BACKEND_APP --resource-group $RESOURCE_GROUP \
            --startup-file "cd backend && pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Deploy Backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP }}
          package: ./backend

  # ─────────────────────────────────────────
  # JOB 3: Deploy ML Service
  # ─────────────────────────────────────────
  deploy-ml:
    name: Deploy ML Ingestion Service
    runs-on: ubuntu-latest
    needs: deploy-database
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create ML Web App
        run: |
          EXISTS=$(az webapp show --name $ML_APP --resource-group $RESOURCE_GROUP --query name -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            az webapp create --name $ML_APP --resource-group $RESOURCE_GROUP --plan $APP_PLAN --runtime "PYTHON:3.11"
          else
            echo "ML app already exists."
          fi

      - name: Configure ML Settings
        run: |
          az webapp config appsettings set --name $ML_APP --resource-group $RESOURCE_GROUP --settings \
            DATABASE_URL="postgresql://$POSTGRES_USER:${{ secrets.POSTGRES_PASSWORD }}@$POSTGRES_SERVER.postgres.database.azure.com/$POSTGRES_DB"
          az webapp config set --name $ML_APP --resource-group $RESOURCE_GROUP \
            --startup-file "cd ml-services && pip install -r requirements.txt && python main.py"

      - name: Deploy ML Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.ML_APP }}
          package: ./ml-services

  # ─────────────────────────────────────────
  # JOB 4: Build & Deploy Angular Frontend
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Angular Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-ang/package-lock.json

      - name: Install & Build Angular
        run: |
          cd frontend-ang
          npm install
          npm run build:prod

      - name: Deploy Frontend via Publish Profile
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend-ang/dist/frontend-ang
