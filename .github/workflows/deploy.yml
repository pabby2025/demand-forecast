name: Deploy DFC Frontend to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FRONTEND_APP: dfc-frontend-pabby

jobs:
  deploy-frontend:
    name: Build & Deploy Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-ang/package-lock.json

      - name: Install & Build Angular
        run: |
          cd frontend-ang
          npm install --legacy-peer-deps
          npm run build:prod

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend-ang/dist/frontend-ang
